<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/styles/globals.css">
  <title>UrbSync - Extrator de Processos</title>
</head>

<body>

  <!-- global wrapper-->
  <main class=" relative w-[350px] h-[600px] bg-neutral-950 flex flex-col items-center justify-center antialiased z-10">

    <!--ui background-->
    <div class="absolute inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-0 left-0 w-48 h-48 bg-green-700/60 rounded-full blur-[80px]"></div>
      <div class="absolute top-1/2 -right-20 w-48 h-48 bg-sky-500/70 rounded-full blur-[80px]"></div>
      <div class="absolute -bottom-20 right-1/2 w-56 h-56 bg-purple-500/70 rounded-full blur-[90px]"></div>
    </div>

    <!--section wrapper for the content-->

    <section class="w-full h-full flex flex-col items-center justify-between py-5 px-10">

      <!--badge with project's version-->
      <div
        class="flex  items-center justify-center  max-w-40  gap-2 bg-[rgba(255,255,255,0.07)] backdrop-blur-sm py-2 px-3 rounded-full border border-1 border-white/10">
        <div class="w-2 h-2 bg-white/30 rounded-full "></div>
        <span class="text-[12px] text-gray-400 tracking-widest leading-none">
          V1.0 Beta
        </span>

      </div>

      <!--wrapper for the texts-->
      <div class="max-w-6xl flex flex-col items-center gap-4">
        <h1
          class="text-5xl font-bold  text-transparent p-2 bg-clip-text bg-gradient-to-b from-sky-50 to-sky-600 tracking-tighter italic">Urb<span class="text-transparent bg-clip-text bg-gradient-to-b from-emerald-50 to-emerald-600">Sync</span>
        </h1>
        <p class=" leading-relaxed tracking-wide text-gray-200 text-lg">
          Automação de extração para <b class="text-blue-300">Aprova Digital</b> e <b class="text-blue-300">SEI</b>.
      </div>
      </p>

      <!--button area-->

      <!--extract button-->
      <button id="extractBtn"
      aria-label="extrair informações"
        class="group w-full flex items-center justify-center gap-2 bg-gradient-to-r from-sky-600 to-sky-800 hover:from-sky-800 hover:to-sky-600 text-white text-sm tracking-widest  font-bold py-3 px-4 rounded-xl transition-all duration-300 ease-in ">

        <svg class="w-5 h-5 group-hover:animate-bounce transition-transform duration-300"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>

        Extrair informações
      </button>

      <!--save excel button-->
      <button id="saveExcelBtn"
      aria-label="salvar excel"
        class="group w-full flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-800 hover:to-emerald-600 text-white text-sm tracking-widest  font-bold py-3 px-4 rounded-xl  transition-all duration-300 ease-in ">

        <svg xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="group-hover:animate-bounce transition-transform duration-300">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12"
            x2="12"
            y1="15"
            y2="3" />
        </svg>

        Salvar dados no Excel
      </button>

      <!--clear storage button-->
      <button id="clearDataBtn"
      aria-label="excluir informações"
        class="group w-full bg-zinc-800 flex items-center justify-center gap-2 border-1 border-white/5 text-zinc-300  tracking-widest text-sm py-3 px-4 rounded-xl shadow-lg hover:text-red-300 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="group-hover:animate-bounce transition-transform duration-300">
          <path d="M3 6h18" />
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
          <line x1="10"
            x2="10"
            y1="11"
            y2="17" />
          <line x1="14"
            x2="14"
            y1="11"
            y2="17" />
        </svg>
        Excluir dados da memória
      </button>

      <div class="w-full h-[0.5px] bg-white/40 "></div>
      <div
        class="w-full  bg-[rgba(255,255,255,0.07)]  backdrop-blur-sm border border-1 border-white/10 rounded-lg p-2 flex items-center justify-center gap-2">
        <div class="status-dot w-2 h-2 rounded-full bg-white/60 "></div>
        <span id="status-text"
          class="tracking-widest text-[12px] font-bold text-zinc-300">Aguardando comando...</span>
      </div>

      <div
        class="w-full  bg-slate-900  backdrop-blur-sm border border-1 border-white/10 rounded-lg p-2 flex items-center justify-center gap-2">
        <div class="w-2 h-2 rounded-full bg-slate-500 "></div>
        <span id="process-text"
          class="tracking-widest text-[12px] font-bold text-zinc-400"></span>
      </div>
      
    </section>

    <footer
      class="bg-neutral-800 w-full py-2 flex items-center justify-between align-center px-4">
      <div class="flex justify-items-center items-center gap-x-2">
        <span class="text-[11px] text-zinc-400 tracking-widest">
          &copy; 2026 - <a href="https://www.linkedin.com/in/victor-kiss/"
            rel="noreferrer noopener"
            target="_blank"
            class="font-bold hover:cursor-pointer ">Victor Kiss</a>
        </span>
      </div>
      <div class="flex justify-items-center items-center gap-x-2">
        <div class="status-dot w-1 h-1 rounded-full bg-emerald-400"></div>
        <span class="text-[11px] text-emerald-400 tracking-wide">
          online
        </span>
      </div>

    </footer>
  </main>

  <script type="module"
    src="./popup.js"></script>
</body>

</html>
